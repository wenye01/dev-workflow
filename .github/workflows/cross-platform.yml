name: Cross Platform

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - 'codex/**'
  workflow_dispatch:
  repository_dispatch:
    types:
      - cross-platform-test

permissions:
  contents: read

jobs:
  test:
    name: Node from .nvmrc on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: node dist/cli/index.js --help
